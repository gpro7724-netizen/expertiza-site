name: Deploy to server
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          sudo apt-get install -y -qq sshpass
          export SSHPASS='19172024Mark'
          SSH="sshpass -e ssh -o StrictHostKeyChecking=no ubuntu@212.22.94.21"
          SCP="sshpass -e scp -o StrictHostKeyChecking=no"
          
          $SSH "mkdir -p /home/ubuntu/expertiza"
          $SCP index.html ubuntu@212.22.94.21:/home/ubuntu/expertiza/index.html
          
          $SSH "sudo rm -f /etc/nginx/sites-enabled/expertiza.conf"
          $SSH "sudo tee /etc/nginx/sites-enabled/expertiza.conf > /dev/null <<'NGCONF'
          server {
              listen 8383;
              server_name _;
              root /home/ubuntu/expertiza;
              index index.html;
              location / {
                  try_files \$uri \$uri/ =404;
              }
          }
          NGCONF"
          
          $SSH "sudo nginx -t && sudo systemctl reload nginx"
          $SSH "sudo ufw allow 8383/tcp 2>/dev/null; sudo iptables -I INPUT -p tcp --dport 8383 -j ACCEPT 2>/dev/null"
          
          echo "=== Test ==="
          $SSH "curl -sI http://localhost:8383/"
          curl -sI --connect-timeout 10 http://212.22.94.21:8383/
