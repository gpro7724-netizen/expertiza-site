name: Deploy to server
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        run: |
          sudo apt-get install -y sshpass
          sshpass -p '19172024Mark' ssh -o StrictHostKeyChecking=no ubuntu@212.22.94.21 "mkdir -p /home/ubuntu/expertiza"
          sshpass -p '19172024Mark' scp -o StrictHostKeyChecking=no index.html ubuntu@212.22.94.21:/home/ubuntu/expertiza/index.html
          sshpass -p '19172024Mark' ssh -o StrictHostKeyChecking=no ubuntu@212.22.94.21 "echo 'server { listen 8787; server_name _; root /home/ubuntu/expertiza; index index.html; location / { try_files \$uri \$uri/ =404; } }' | sudo tee /etc/nginx/sites-enabled/expertiza.conf > /dev/null && sudo nginx -t && sudo systemctl reload nginx"
