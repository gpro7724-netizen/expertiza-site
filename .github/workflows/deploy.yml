name: Deploy to server
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          sudo apt-get install -y sshpass
          export SSHPASS='19172024Mark'
          SSH="sshpass -e ssh -o StrictHostKeyChecking=no ubuntu@212.22.94.21"
          SCP="sshpass -e scp -o StrictHostKeyChecking=no"
          
          $SSH "mkdir -p /home/ubuntu/expertiza"
          $SCP index.html ubuntu@212.22.94.21:/home/ubuntu/expertiza/index.html
          
          $SSH "cat > /tmp/expertiza.conf << 'NGINX'
          server {
              listen 8787;
              server_name _;
              root /home/ubuntu/expertiza;
              index index.html;
              location / { try_files \\$uri \\$uri/ =404; }
          }
          NGINX"
          
          $SSH "sudo cp /tmp/expertiza.conf /etc/nginx/sites-enabled/expertiza.conf"
          $SSH "sudo ufw allow 8787/tcp || true"
          $SSH "sudo nginx -t && sudo systemctl reload nginx"
          $SSH "curl -sI http://localhost:8787/ | head -3"
          echo "Done!"
